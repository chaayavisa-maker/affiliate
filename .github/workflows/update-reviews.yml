name: Weekly Review Updates

# Detects pricing / feature / quality changes in reviewed AI tools and
# patches the affected MDX posts automatically.
#
# Triggers:
#   - Every Sunday at 9 AM UTC (after the daily content run)
#   - Manually from the Actions tab (can target a specific post slug)

on:
  schedule:
    - cron: '0 9 * * 0'   # Sundays 09:00 UTC
  workflow_dispatch:
    inputs:
      slug:
        description: |
          Filename slug to check (leave blank to check ALL posts).
          Example: "best-ai-presentation-makers" checks that one post only.
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run — detect changes but do NOT commit back to the repo'
        required: false
        default: false
        type: boolean

jobs:
  review-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated MDX files

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # full history so git push works

      # ── 2. Python setup ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: agents/requirements.txt

      - name: Install dependencies
        run: |
          cd agents
          pip install -r requirements.txt

      # ── 3. Run review agent ───────────────────────────────────────────────
      - name: Run review agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Tell the agent it's in CI so it commits & pushes
          GITHUB_ACTIONS: ${{ github.event.inputs.dry_run == 'true' && '' || 'true' }}
        run: |
          cd agents
          SLUG="${{ github.event.inputs.slug }}"
          if [ -n "$SLUG" ]; then
            echo "Running review agent for slug: $SLUG"
            python review_agent.py --slug "$SLUG"
          else
            echo "Running review agent for ALL posts"
            python review_agent.py
          fi

      # ── 4. Upload review summary ──────────────────────────────────────────
      - name: Upload review summary
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: review-summary-${{ github.run_id }}
          path: agents/review_summary.json
          retention-days: 60

      # ── 5. Notify on significant updates ─────────────────────────────────
      - name: Print update summary
        if: always()
        run: |
          echo "=== Review Run Complete ==="
          if [ -f agents/review_summary.json ]; then
            cat agents/review_summary.json
          else
            echo "No summary file produced."
          fi
