name: Daily Content Generation

on:
  schedule:
    # Runs every day at 8 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      articles_count:
        description: 'Number of articles to generate'
        required: false
        default: '2'
        type: number

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push new articles

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd agents
          pip install -r requirements.txt

      - name: Run content pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ARTICLES_PER_RUN: ${{ inputs.articles_count || '2' }}
          GITHUB_ACTIONS: 'true'
        run: |
          cd agents
          python orchestrator.py

      - name: Upload run summary
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: run-summary-${{ github.run_id }}
          path: agents/run_summary.json
          retention-days: 30
