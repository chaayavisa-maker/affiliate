name: Publish Content

on:
  workflow_dispatch:
    inputs:
      generate_run_id:
        description: |
          Run ID of the Generate Content workflow to publish.
          Find it in Actions → Generate Content → the run you want.
          Leave empty to use the most recent successful generate run.
        required: false
        default: ''
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for git push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve generate run ID
        id: resolve
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const inputId = '${{ inputs.generate_run_id }}';
            if (inputId) {
              core.info(`Using provided run ID: ${inputId}`);
              return inputId;
            }
            // Find latest successful Generate Content run
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'generate.yml',
              status: 'success',
              per_page: 1
            });
            if (!runs.data.workflow_runs.length) {
              core.setFailed('No successful Generate Content run found.');
              return '';
            }
            const latest = runs.data.workflow_runs[0].id;
            core.info(`Resolved to latest generate run: ${latest}`);
            return String(latest);

      - name: Download generated articles
        uses: actions/download-artifact@v4
        with:
          name: generated-articles-${{ steps.resolve.outputs.result }}
          # Restore files to repo root so paths match the originals
          path: .

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd agents
          pip install -r requirements.txt

      - name: Commit and push articles
        env:
          GITHUB_ACTIONS: 'true'
          GENERATE_RUN_ID: ${{ steps.resolve.outputs.result }}
        run: |
          cd agents
          python publish.py

      - name: Upload publish summary
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: publish-summary-${{ github.run_id }}
          path: agents/run_summary.json
          retention-days: 30
